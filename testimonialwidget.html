<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyLeave — Testimonial Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #6e7d60;
      --bg-section: #7a8a6b;
      --card-bg: #f5f1eb;
      --card-bg-hover: #f9f6f1;
      --text-primary: #2a2e24;
      --text-secondary: #5a6350;
      --text-on-dark: #f5f1eb;
      --text-muted: #8a9478;
      --accent-organisation: #7a8a6b;
      --accent-medarbejder: #c4a882;
      --accent-refusion: #a8b89a;
      --quote-mark-color: rgba(122, 138, 107, 0.12);
      --shadow-card: 0 2px 12px rgba(42, 46, 36, 0.08), 0 1px 3px rgba(42, 46, 36, 0.06);
      --shadow-card-hover: 0 8px 28px rgba(42, 46, 36, 0.14), 0 2px 6px rgba(42, 46, 36, 0.08);
      --radius: 16px;
      --font-display: 'Poppins', Helvetica, sans-serif;
      --font-body: 'Poppins', Helvetica, sans-serif;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: var(--font-body);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    /* ─── TWEAK DEFAULTS ─────────────────────────────────────── */
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "sectionTitle": "Det siger vores kunder",
      "cardBg": "#f5f1eb",
      "bgColor": "#7a8a6b",
      "accentOrg": "#7a8a6b",
      "accentEmp": "#c4a882",
      "accentRef": "#a8b89a"
    }/*EDITMODE-END*/;

    /* ─── TESTIMONIAL DATA ───────────────────────────────────── */
    /* ↓ ADD NEW TESTIMONIALS HERE — one object per entry */
    const TESTIMONIALS = [
      {
        id: "lene-borneringen",
        name: "Lene Husted Ørnø",
        role: "Teamleder Løn",
        company: "Børneringen",
        companyMeta: "Landsdækkende paraplyorganisation · +100 institutioner",
        thumbnail: "uploads/lene husted.jpg",
        companyLogo: "logos/borneringen.png",
        pullQuote: "EasyLeave har givet os struktur, overblik og én ensartet proces på tværs af organisationen.",
        fullQuote: "Med EasyLeave har vi fået struktur, overblik og en ensartet proces på tværs af organisationen. Det sparer ikke kun tid for lederne i institutionerne og for os i administrationen, men skaber også tryghed for medarbejderne, fordi de nu bliver guidet sikkert gennem et område, som ellers opleves komplekst. Vi oplever et tæt og professionelt samarbejde med EasyLeave-teamet, som har sikret en god overgang til den nye måde at arbejde på.",
        theme: "organisation"
      },
      {
        id: "anette-bravida",
        name: "Anette Holse",
        role: "Lønchef",
        company: "Bravida",
        companyMeta: "Teknisk servicevirksomhed · +3.000 medarbejdere",
        thumbnail: "uploads/Anette bravida.jpg",
        companyLogo: "logos/bravida.png",
        pullQuote: "Den faste struktur understøtter et effektivt workflow for leder, medarbejder og lønkontor — og vi understøtter Bravidas fokus på transparens, troværdighed og tillid.",
        fullQuote: "Vores medarbejdere og ledere er tilfredse med systemet. Den automatiske videresendelse af udfyldte barselsplaner til relevante parter skaber stor værdi og sikrer, at alle har den nødvendige information samtidig. Den faste struktur understøtter et effektivt workflow for leder, medarbejder og lønkontor.\n\nOpsætningen er intuitiv og kan tilpasses forskellige ansættelsestyper, ligesom stamdata kan uploades og tilpasses. Systemet understøtter Bravidas fokus på transparens, troværdighed og tillid i dialogen om barsel. Den klare struktur gør processen mere tryg og overskuelig for alle parter.",
        theme: "refusion"
      },
      // ── Tilføj næste testimonial herunder — kopier blokken ovenfor ──
    ];
    /* ↑ END TESTIMONIAL DATA ─────────────────────────────────── */

    /* ─── HELPERS ────────────────────────────────────────────── */
    const THEME_COLORS = {
      organisation: "var(--accent-organisation)",
      medarbejder: "var(--accent-medarbejder)",
      refusion: "var(--accent-refusion)"
    };

    const THEME_LABELS = {
      organisation: "Overblik",
      medarbejder: "Tryghed",
      refusion: "Refusion"
    };

    /* Initials avatar */
    function Avatar({ name, size = 56, thumbnail, theme }) {
      const initials = name.split(" ").slice(0, 2).map(n => n[0]).join("").toUpperCase();
      const themeColor = THEME_COLORS[theme] || "var(--accent-organisation)";
      return (
        <div style={{
          width: size, height: size, borderRadius: "50%",
          overflow: "hidden", flexShrink: 0, position: "relative",
          background: `color-mix(in srgb, ${themeColor} 18%, #f5f1eb)`,
          display: "flex", alignItems: "center", justifyContent: "center"
        }}>
          {thumbnail
            ? <img
                src={thumbnail}
                alt={`${name}, portræt`}
                loading="lazy"
                style={{ width: "100%", height: "100%", objectFit: "cover" }}
              />
            : <span style={{
                fontFamily: "var(--font-body)", fontWeight: 600, fontSize: size * 0.36,
                color: themeColor, letterSpacing: "0.02em", userSelect: "none"
              }}>{initials}</span>
          }
        </div>
      );
    }

    /* Company logo placeholder */
    function CompanyLogo({ name, logo, theme, isWhiteLogo }) {
      if (logo) {
        const filter = isWhiteLogo ? "brightness(0)" : "none";
        return <img src={logo} alt={`${name} logo`} style={{ maxWidth: 90, maxHeight: 28, objectFit: "contain", filter }} loading="lazy" />;
      }
      const themeColor = THEME_COLORS[theme] || "var(--accent-organisation)";
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 5, opacity: 0.55 }}>
          <div style={{ width: 20, height: 20, borderRadius: 4, background: themeColor, flexShrink: 0 }}></div>
          <span style={{ fontFamily: "var(--font-body)", fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.08em", textTransform: "uppercase" }}>{name}</span>
        </div>
      );
    }

    /* ─── SINGLE CARD ────────────────────────────────────────── */
    function TestimonialCard({ testimonial, tweaks, isFocused, onFocusRequest }) {
      const [expanded, setExpanded] = useState(false);
      const [contentHeight, setContentHeight] = useState(0);
      const contentRef = useRef(null);
      const expandBtnId = `expand-${testimonial.id}`;
      const contentId = `content-${testimonial.id}`;

      useEffect(() => {
        if (contentRef.current) {
          setContentHeight(contentRef.current.scrollHeight);
        }
      }, [expanded]);

      const themeColor = THEME_COLORS[testimonial.theme] || "var(--accent-organisation)";
      const quoteFont = "var(--font-display)";

      const handleKeyDown = useCallback((e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          setExpanded(v => !v);
        }
      }, []);

      return (
        <article
          style={{
            background: tweaks.cardBg || "var(--card-bg)",
            borderRadius: "var(--radius)",
            padding: 24,
            boxShadow: "var(--shadow-card)",
            display: "flex",
            flexDirection: "column",
            gap: 0,
            position: "relative",
            transition: "transform 150ms ease-out, box-shadow 150ms ease-out",
            cursor: "default",
            overflow: "hidden",
            outline: isFocused ? `2px solid ${themeColor}` : "none",
            outlineOffset: 2
          }}
          onMouseEnter={e => {
            e.currentTarget.style.transform = "translateY(-2px)";
            e.currentTarget.style.boxShadow = "var(--shadow-card-hover)";
          }}
          onMouseLeave={e => {
            e.currentTarget.style.transform = "translateY(0)";
            e.currentTarget.style.boxShadow = "var(--shadow-card)";
          }}
        >
          {/* Decorative quote mark */}
          <div aria-hidden="true" style={{
            position: "absolute", top: 12, left: 16,
            fontFamily: "var(--font-display)", fontSize: 120, lineHeight: 1,
            color: "var(--quote-mark-color)", fontWeight: 600, userSelect: "none",
            pointerEvents: "none", zIndex: 0
          }}>"</div>

          {/* Card header: avatar + name + logo */}
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, position: "relative", zIndex: 1, marginBottom: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <Avatar name={testimonial.name} thumbnail={testimonial.thumbnail} theme={testimonial.theme} />
              <div>
                <div style={{ fontFamily: "var(--font-body)", fontWeight: 600, fontSize: 15, color: "var(--text-primary)", lineHeight: 1.3 }}>{testimonial.name}</div>
                <div style={{ fontFamily: "var(--font-body)", fontSize: 13, color: "var(--text-secondary)", marginTop: 2, lineHeight: 1.4 }}>{testimonial.role}</div>
                <div style={{ fontFamily: "var(--font-body)", fontSize: 12, color: "var(--text-muted)", marginTop: 2, lineHeight: 1.4 }}>{testimonial.companyMeta}</div>
              </div>
            </div>
            <div style={{ paddingTop: 4, flexShrink: 0 }}>
              <CompanyLogo name={testimonial.company} logo={testimonial.companyLogo} theme={testimonial.theme} isWhiteLogo={false} />
            </div>
          </div>

          {/* Pull quote */}
          <blockquote style={{
            fontFamily: quoteFont,
            fontSize: 20,
            fontWeight: 500,
            lineHeight: 1.5,
            color: "var(--text-primary)",
            position: "relative", zIndex: 1,
            marginBottom: 14,
            fontStyle: "normal"
          }}>
            {testimonial.pullQuote}
          </blockquote>

          {/* Expand/collapse full quote */}
          <div style={{ position: "relative", zIndex: 1 }}>
            <div
              id={contentId}
              ref={contentRef}
              role="region"
              aria-label={`Fuld udtalelse fra ${testimonial.name}`}
              style={{
                maxHeight: expanded ? `${contentHeight}px` : "0px",
                overflow: "hidden",
                transition: "max-height 200ms ease-out",
              }}
            >
              <p style={{
                fontFamily: "var(--font-body)", fontSize: 14, lineHeight: 1.65,
                color: "var(--text-secondary)", paddingBottom: 14,
                borderTop: `1px solid rgba(90,99,80,0.12)`, paddingTop: 14, marginTop: 0
              }}>
                {testimonial.fullQuote}
              </p>
            </div>

            <button
              id={expandBtnId}
              aria-expanded={expanded}
              aria-controls={contentId}
              onClick={() => setExpanded(v => !v)}
              onKeyDown={handleKeyDown}
              style={{
                background: "none", border: "none", padding: 0,
                fontFamily: "var(--font-body)", fontSize: 13, fontWeight: 500,
                color: "var(--text-secondary)", cursor: "pointer",
                display: "flex", alignItems: "center", gap: 4,
                textDecoration: "underline", textDecorationColor: "rgba(90,99,80,0.3)",
                textUnderlineOffset: 3, transition: "color 120ms",
              }}
              onMouseEnter={e => e.currentTarget.style.color = "var(--text-primary)"}
              onMouseLeave={e => e.currentTarget.style.color = "var(--text-secondary)"}
            >
              {expanded ? "Skjul ↑" : "Læs hele udtalelsen ↓"}
            </button>
          </div>


        </article>
      );
    }

    /* ─── CAROUSEL DOT NAVIGATION ────────────────────────────── */
    function Dots({ count, current, onSelect, accentColor }) {
      return (
        <div style={{ display: "flex", gap: 8, alignItems: "center", justifyContent: "center" }}>
          {Array.from({ length: count }).map((_, i) => (
            <button
              key={i}
              aria-label={`Gå til udtalelse ${i + 1}`}
              aria-current={i === current ? "true" : undefined}
              onClick={() => onSelect(i)}
              style={{
                width: i === current ? 20 : 8, height: 8,
                borderRadius: 4, border: "none", cursor: "pointer",
                background: i === current ? accentColor : "rgba(122,138,107,0.3)",
                transition: "width 200ms ease-out, background 200ms",
                padding: 0
              }}
            />
          ))}
        </div>
      );
    }

    /* ─── ARROW BUTTON ───────────────────────────────────────── */
    function ArrowBtn({ direction, onClick, disabled, accentColor }) {
      return (
        <button
          aria-label={direction === "prev" ? "Forrige udtalelse" : "Næste udtalelse"}
          onClick={onClick}
          disabled={disabled}
          style={{
            width: 44, height: 44, borderRadius: "50%",
            border: `1.5px solid rgba(245,241,235,0.3)`,
            background: "rgba(245,241,235,0.1)",
            color: "var(--text-on-dark)", cursor: disabled ? "not-allowed" : "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 18, transition: "background 150ms, opacity 150ms",
            opacity: disabled ? 0.3 : 1, flexShrink: 0
          }}
          onMouseEnter={e => { if (!disabled) e.currentTarget.style.background = "rgba(245,241,235,0.2)"; }}
          onMouseLeave={e => { e.currentTarget.style.background = "rgba(245,241,235,0.1)"; }}
        >
          {direction === "prev" ? "←" : "→"}
        </button>
      );
    }

    /* ─── MAIN SECTION ───────────────────────────────────────── */
    function TestimonialSection({ tweaks }) {
      const [current, setCurrent] = useState(0);
      const count = TESTIMONIALS.length;
      const isCarousel = count >= 4;
      const isGrid = count <= 3;

      // Apply CSS custom props from tweaks
      useEffect(() => {
        document.documentElement.style.setProperty("--bg", tweaks.bgColor || "#7a8a6b");
        document.documentElement.style.setProperty("--bg-section", tweaks.bgColor || "#7a8a6b");
        document.documentElement.style.setProperty("--accent-organisation", tweaks.accentOrg || "#7a8a6b");
        document.documentElement.style.setProperty("--accent-medarbejder", tweaks.accentEmp || "#c4a882");
        document.documentElement.style.setProperty("--accent-refusion", tweaks.accentRef || "#a8b89a");
      }, [tweaks]);

      // Keyboard navigation for carousel
      useEffect(() => {
        if (!isCarousel) return;
        const handler = (e) => {
          if (e.key === "ArrowLeft") setCurrent(v => Math.max(0, v - 1));
          if (e.key === "ArrowRight") setCurrent(v => Math.min(count - 1, v + 1));
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [isCarousel, count]);

      const accentColor = "var(--accent-organisation)";

      const gridCols = count === 1 ? "1fr" : count === 2 ? "1fr 1fr" : "1fr 1fr 1fr";

      return (
        <section
          role="region"
          aria-label="Kundeudtalelser"
          style={{
            width: "100%", maxWidth: isGrid ? (count === 1 ? 680 : count === 2 ? 960 : 1200) : 1200,
            margin: "0 auto"
          }}
        >
          {/* Section heading */}
          <h2 style={{
            fontFamily: "var(--font-display)", fontWeight: 400, fontStyle: "italic",
            fontSize: "clamp(28px, 4vw, 42px)", color: "var(--text-on-dark)",
            textAlign: "center", marginBottom: 48, lineHeight: 1.25,
            letterSpacing: "-0.01em"
          }}>
            {tweaks.sectionTitle}
          </h2>

          {/* GRID MODE (1–3 testimonials) */}
          {isGrid && (
            <div style={{
              display: "grid",
              gridTemplateColumns: gridCols,
              gap: 24,
            }}>
              {TESTIMONIALS.map(t => (
                <TestimonialCard key={t.id} testimonial={t} tweaks={tweaks} isFocused={false} />
              ))}
            </div>
          )}

          {/* CAROUSEL MODE (4+ testimonials) */}
          {isCarousel && (
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 24 }}>
                <ArrowBtn direction="prev" onClick={() => setCurrent(v => Math.max(0, v - 1))} disabled={current === 0} accentColor={accentColor} />
                <div style={{ flex: 1, overflow: "hidden" }}>
                  <div style={{
                    display: "flex",
                    transform: `translateX(calc(-${current * 100}% - ${current * 24}px))`,
                    transition: "transform 280ms cubic-bezier(0.4, 0, 0.2, 1)",
                    gap: 24,
                    alignItems: "stretch"
                  }}>
                    {TESTIMONIALS.map((t, i) => (
                      <div key={t.id} style={{ minWidth: "100%", flex: "0 0 100%" }}>
                        <TestimonialCard testimonial={t} tweaks={tweaks} isFocused={i === current} onFocusRequest={() => setCurrent(i)} />
                      </div>
                    ))}
                  </div>
                </div>
                <ArrowBtn direction="next" onClick={() => setCurrent(v => Math.min(count - 1, v + 1))} disabled={current === count - 1} accentColor={accentColor} />
              </div>
              <Dots count={count} current={current} onSelect={setCurrent} accentColor={accentColor} />
            </div>
          )}

        </section>
      );
    }

    /* ─── APP ROOT ───────────────────────────────────────────── */
    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return (
        <>
          {/* Page background matches brand section color */}
          <style>{`body { background: ${t.bgColor || "#7a8a6b"}; }`}</style>

          <TestimonialSection tweaks={t} />

          <TweaksPanel>
            <TweakText
              label="Overskrift"
              value={t.sectionTitle}
              onChange={(v) => setTweak("sectionTitle", v)}
            />
            <TweakSection label="Farver">
              <TweakColor label="Baggrund"        value={t.bgColor}    onChange={(v) => setTweak("bgColor", v)} />
              <TweakColor label="Kort baggrund"   value={t.cardBg}     onChange={(v) => setTweak("cardBg", v)} />
              <TweakColor label="Accent: Org."    value={t.accentOrg}  onChange={(v) => setTweak("accentOrg", v)} />
              <TweakColor label="Accent: Medarbj" value={t.accentEmp}  onChange={(v) => setTweak("accentEmp", v)} />
              <TweakColor label="Accent: Ref."    value={t.accentRef}  onChange={(v) => setTweak("accentRef", v)} />
            </TweakSection>

          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- ─── RESPONSIVE OVERRIDES ─────────────────────────────── -->
  <style>
    @media (max-width: 1023px) {
      /* Switch 3-col grid to 1-col on tablet */
      [data-grid="3col"] {
        grid-template-columns: 1fr !important;
      }
    }

    @media (max-width: 767px) {
      #root { padding: 40px 16px; }
    }

    /* Smooth scrolling for expand animations */
    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 0.01ms !important; }
    }
  </style>

  <!-- ─── DOCUMENTATION COMMENT ─────────────────────────────
  
  TESTIMONIAL WIDGET — EasyLeave
  ================================
  
  ADDING A NEW TESTIMONIAL
  ────────────────────────
  Find the TESTIMONIALS array (~line 85) and add a new object:
  
    {
      id: "unik-id",                        // URL-safe, kebab-case
      name: "Fulde Navn",
      role: "Titel",
      company: "Virksomhedsnavn",
      companyMeta: "Beskrivelse · antal",
      thumbnail: "/testimonials/navn.jpg",  // 200×200 JPG/WEBP anbefalet
      companyLogo: "/logos/navn.svg",       // SVG, monokromt
      pullQuote: "Kort stærk udtalelse.",
      fullQuote: "Fuld og detaljeret udtalelse...",
      theme: "organisation"                 // eller "medarbejder" | "refusion"
    }
  
  LAYOUT REGLER
  ─────────────
  • 1 testimonial → centreret, fuld bredde
  • 2 testimonials → side om side (50/50)
  • 3 testimonials → 3-kolonne grid
  • 4+ testimonials → carousel med pile + dots
  
  BILLEDER
  ─────────
  • Thumbnails: 200×200 px, JPG eller WEBP, rektangulært — widget cropper til cirkel
  • Logoer: SVG foretrækkes; widget konverterer til monokromt via CSS filter
  • Mangler billeder? Widget viser initialer-avatar og tekst-logo automatisk
  
  -->
</html>
