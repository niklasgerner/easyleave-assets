<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Roller</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #ffffff; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  .roller { width: 100%; overflow: hidden; position: relative; -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 8%, #000 92%, transparent 100%); mask-image: linear-gradient(to right, transparent 0%, #000 8%, #000 92%, transparent 100%); }
  .track { display: flex; width: max-content; animation: scroll 40s linear infinite; align-items: center; }
  .roller:hover .track { animation-play-state: paused; }

  /*
    Each .logo box is a fixed height (so all logos sit on the same baseline).
    The img inside uses --w (pixels) as its rendered width — height auto
    keeps the original aspect ratio. This matches the Claude design tweaks
    where each logo has its own pixel width.
  */
  .logo {
    --w: 200px;
    flex: 0 0 auto;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 36px;
    opacity: 0.75;
    filter: grayscale(100%);
    transition: opacity 0.25s ease, filter 0.25s ease, transform 0.25s ease;
    cursor: pointer;
    text-decoration: none;
  }
  .logo:hover { opacity: 1; filter: grayscale(0%); transform: scale(1.05); }
  .logo img {
    width: var(--w);
    height: auto;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Per-logo width tweaks (matches Claude design tweaks 1:1) */
  .s-bavarian    { --w: 150px; }
  .s-bravida     { --w: 190px; }
  .s-bygma       { --w: 192px; }
  .s-gard        { --w: 186px; }
  .s-jamo        { --w: 156px; }
  .s-kmd         { --w: 200px; }
  .s-lemvigh     { --w: 200px; }
  .s-zenegy      { --w: 200px; }
  .s-novax       { --w: 192px; }
  .s-nti         { --w: 142px; }
  .s-wicotec     { --w: 200px; }
  .s-borneringen { --w: 64px;  }

  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @media (max-width: 640px) {
    .logo { height: 140px; margin: 0 22px; }
    .logo img { width: calc(var(--w) * 0.7); }
  }
</style>
</head>
