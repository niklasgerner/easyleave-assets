<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Roller</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #ffffff; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  .roller { width: 100%; overflow: hidden; position: relative; -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 8%, #000 92%, transparent 100%); mask-image: linear-gradient(to right, transparent 0%, #000 8%, #000 92%, transparent 100%); }
  .track { display: flex; width: max-content; animation: scroll 40s linear infinite; align-items: center; }
  .roller:hover .track { animation-play-state: paused; }

  /* Base box: holds whatever scale% the inner img is set to */
  .logo {
    --scale: 100;
    flex: 0 0 auto;
    width: 260px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 28px;
    opacity: 0.75;
    filter: grayscale(100%);
    transition: opacity 0.25s ease, filter 0.25s ease, transform 0.25s ease;
    cursor: pointer;
    text-decoration: none;
  }
  .logo:hover { opacity: 1; filter: grayscale(0%); transform: scale(1.05); }
  .logo img {
    width: calc(1% * var(--scale));
    height: calc(1% * var(--scale));
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Per-logo scale tweaks (matches Claude design tweaks 1:1) */
  .s-bavarian   { --scale: 150; }
  .s-bravida    { --scale: 190; }
  .s-bygma      { --scale: 192; }
  .s-gard       { --scale: 186; }
  .s-jamo       { --scale: 156; }
  .s-kmd        { --scale: 200; }
  .s-lemvigh    { --scale: 200; }
  .s-zenegy     { --scale: 200; }
  .s-novax      { --scale: 192; }
  .s-nti        { --scale: 142; }
  .s-wicotec    { --scale: 200; }
  .s-borneringen{ --scale: 64;  }

  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @media (max-width: 640px) {
    .logo { width: 180px; height: 110px; margin: 0 18px; }
  }
</style>
</head>
