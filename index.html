<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Roller</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #ffffff; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  .roller { width: 100%; overflow: hidden; position: relative; -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 8%, #000 92%, transparent 100%); mask-image: linear-gradient(to right, transparent 0%, #000 8%, #000 92%, transparent 100%); }
  .track { display: flex; width: max-content; animation: scroll 40s linear infinite; align-items: center; }
  .roller:hover .track { animation-play-state: paused; }
  .logo { flex: 0 0 auto; width: 200px; height: 90px; display: flex; align-items: center; justify-content: center; margin: 0 32px; opacity: 0.7; filter: grayscale(100%); transition: opacity 0.25s ease, filter 0.25s ease, transform 0.25s ease; }
  .logo:hover { opacity: 1; filter: grayscale(0%); transform: scale(1.05); }
  .logo img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @media (max-width: 640px) { .logo { width: 140px; height: 70px; margin: 0 20px; } }
</style>
</head>
<body>
<div class="roller"><div class="track">
<div class="logo"><img src="Bavarian_Nordic_logo-matched%20(1).png" alt="Bavarian Nordic"></div>
<div class="logo"><img src="bravida-matched.png" alt="Bravida"></div>
<div class="logo"><img src="Bygma_gruppen_cmyk-e1526633796235-matched.png" alt="Bygma Gruppen"></div>

<div class="logo"><img src="Lemvigh-M-ller_Long_RGB-matched.png" alt="Lemvigh-Müller"></div>
<div class="logo"><img src="Logo_480x90_2x-bbe33b2b-3eb2-4c77-8f71-ccd076e6940e-matched.png" alt="Zenegy"></div>
